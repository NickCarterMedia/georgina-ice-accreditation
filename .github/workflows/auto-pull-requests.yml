name: Auto Pull Requests

on:
  push:
    branches:
      - dev
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Open promotion pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace("refs/heads/", "");
            const base = branch === "dev" ? "staging" : branch === "staging" ? "main" : null;

            if (!base) {
              core.info(`No promotion target configured for ${branch}`);
              return;
            }

            const { owner, repo } = context.repo;
            const head = `${owner}:${branch}`;

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base
            });

            if (existing.data.length > 0) {
              core.info(`Open PR already exists for ${branch} -> ${base}`);
              return;
            }

            await github.rest.pulls.create({
              owner,
              repo,
              title: `Promote ${branch} to ${base}`,
              head: branch,
              base,
              body: [
                `Automated promotion pull request.`,
                ``,
                `Source: \`${branch}\``,
                `Target: \`${base}\``
              ].join("\n")
            });
